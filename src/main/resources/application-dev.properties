spring.application.name=PropertyPlatfrorm

jwt.secret=${SECRET_KEY}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.mongodb.uri=${MONGO_URL}
spring.mongodb.database=${MONGO_DB_NAME}

spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=disougie
spring.mail.password=disougie
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

spring.rabbitmq.listener.direct.acknowledge-mode=manual
spring.rabbitmq.listener.direct.prefetch=1

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}

imagekit.url=${IMAGEKIT_URL}
imagekit.public.key=${IMAGEKIT_PUBLIC_KEY}
imagekit.private.key=${IMAGEKIT_PRIVATE_KEY}
