spring.application.name=PropertyPlatfrorm

jwt.secret=${SECRET_KEY}

spring.datasource.url=${PROD_DB_URL}
spring.datasource.username=${PROD_DB_USER}
spring.datasource.password=${PROD_DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update

spring.mongodb.uri=${MONGO_URL}
spring.mongodb.database=${MONGO_DB_NAME}

spring.rabbitmq.host=${PROD_RABBIT_MQ_HOST}
spring.rabbitmq.port=${PROD_RABBIT_MQ_PORT}
spring.rabbitmq.username=${PROD_RABBIT_MQ_USER}
spring.rabbitmq.password=${PROD_RABBIT_MQ_PASSWORD}
spring.rabbitmq.virtual-host=${PROD_RABBIT_MQ_VIRTUAL_HOST}
spring.rabbitmq.ssl.enabled=true
spring.rabbitmq.listener.direct.acknowledge-mode=manual
spring.rabbitmq.listener.direct.prefetch=1
spring.rabbitmq.listener.simple.concurrency=1
spring.rabbitmq.listener.simple.max-concurrency=3


# SMTP Settings
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=adisougie@gmail.com
spring.mail.password=${SMTP_KEY}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000


#logging.level.org.springframework.mail=DEBUG
#logging.level.org.apache.commons.mail=DEBUG
#logging.level.com.sun.mail.smtp=DEBUG


spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false


imagekit.url=${IMAGEKIT_URL}
imagekit.public.key=${IMAGEKIT_PUBLIC_KEY}
imagekit.private.key=${IMAGEKIT_PRIVATE_KEY}